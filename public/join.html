<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Join Lantern Festival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body, html { margin: 0; padding: 0; overflow-x: hidden; background-color: #050505; }
        
        /* Video Styling */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.4; 
        }

        .content { 
            position: relative; 
            z-index: 10; 
            color: #e3a318; 
            text-align: center;  
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .join-card {
            max-width: 400px;
            width: 90%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(227, 163, 24, 0.3);
            backdrop-filter: blur(5px);
        }

        h1 { 
            font-family: 'Georgia', 'ZCOOL XiaoWei', serif; 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
            color: #e3a318;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            margin-top: 0;
        }

        p { 
            font-family: 'Georgia', 'Ma Shan Zheng', serif; 
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e3a318;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.1rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(227, 163, 24, 0.5);
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e3a318;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(227, 163, 24, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #pinInput {
            text-align: center;
            font-size: 24px;
            letter-spacing: 5px;
        }

        button {
            background: linear-gradient(45deg, #e3a318, #ffcf40);
            color: #000;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'ZCOOL XiaoWei', serif;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(227, 163, 24, 0.5);
        }

        .lantern-icon {
            font-size: 60px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(227, 163, 24, 0.6));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
  </head>
  <body>
    <video src="background_video.mp4" autoplay loop muted playsinline></video>
    
    <div class="content">
        <div class="join-card">
            <div class="join-header">
                <div class="lantern-icon">🏮</div>
                <h1>Join Festival</h1>
                <p>Enter the PIN code displayed on the main screen to join the celebration.</p>
            </div>
            
            <form id="joinForm" action="/mobile.html" method="GET">
                <div class="form-group">
                    <label for="pinInput">Festival PIN</label>
                    <input type="text" id="pinInput" name="pin" placeholder="0000" maxlength="4" pattern="\d{4}" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="nameInput">Your Name</label>
                    <input type="text" id="nameInput" name="username" placeholder="Enter your name" required>
                </div>
                <button type="submit">Enter Festival</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('pinInput').focus();
    </script>
  </body>
</html>
