<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Join Lantern Festival</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
      .join-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
      }

      .join-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .join-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .join-header h1 {
        font-size: 28px;
        color: #333;
        margin: 0 0 10px 0;
        font-weight: 700;
      }

      .join-header .lantern-icon {
        font-size: 60px;
        margin-bottom: 10px;
      }

      .join-header p {
        color: #666;
        margin: 0;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-group input::placeholder {
        color: #aaa;
      }

      #pinInput {
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 8px;
      }

      .join-button {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 10px;
      }

      .join-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .join-button:active {
        transform: translateY(0);
      }

      .join-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .error-message {
        background: #fee;
        color: #c33;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
        text-align: center;
      }

      .error-message.show {
        display: block;
        animation: shake 0.5s;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }

      .divider {
        text-align: center;
        margin: 25px 0;
        position: relative;
      }

      .divider::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
        background: #e0e0e0;
      }

      .divider span {
        background: white;
        padding: 0 15px;
        color: #999;
        font-size: 13px;
        position: relative;
        z-index: 1;
      }

      .scan-hint {
        text-align: center;
        color: #999;
        font-size: 13px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="join-container">
      <div class="join-card">
        <div class="join-header">
          <div class="lantern-icon">🏮</div>
          <h1>Join Lantern Festival</h1>
          <p>Enter your details to create beautiful lanterns</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="joinForm">
          <div class="form-group">
            <label for="nameInput">Your Name</label>
            <input
              type="text"
              id="nameInput"
              placeholder="Enter your name"
              required
              maxlength="20"
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="pinInput">Room PIN</label>
            <input
              type="text"
              id="pinInput"
              placeholder="----"
              required
              pattern="[0-9]{4}"
              maxlength="4"
              inputmode="numeric"
            />
          </div>

          <button type="submit" class="join-button" id="joinButton">
            Join Room
          </button>
        </form>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="scan-hint">
          Scan QR code from host screen to join automatically
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById('joinForm');
      const nameInput = document.getElementById('nameInput');
      const pinInput = document.getElementById('pinInput');
      const joinButton = document.getElementById('joinButton');
      const errorMessage = document.getElementById('errorMessage');

      // Reset button state on page load/back navigation
      window.addEventListener('pageshow', (event) => {
        joinButton.disabled = false;
        joinButton.textContent = 'Join Room';
      });

      // Check if PIN is in URL (from /join/:pin)
      const urlParams = window.location.pathname.match(/\/join\/(\d{4})/);
      if (urlParams && urlParams[1]) {
        pinInput.value = urlParams[1];
        nameInput.focus();
      }

      // Format PIN input
      pinInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);
      });

      // Show error message
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
        setTimeout(() => {
          errorMessage.classList.remove('show');
        }, 3000);
      }

      // Handle form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = nameInput.value.trim();
        const pin = pinInput.value.trim();

        if (!name || pin.length !== 4) {
          showError('Please enter your name and a 4-digit PIN');
          return;
        }

        // Disable button during submission
        joinButton.disabled = true;
        joinButton.textContent = 'Joining...';

        // Store credentials and redirect to mobile page
        sessionStorage.setItem('lantern_pin', pin);
        sessionStorage.setItem('lantern_name', name);

        // Redirect to mobile page
        window.location.href = `/mobile.html?pin=${pin}&name=${encodeURIComponent(name)}`;
      });
    </script>
  </body>
</html>
